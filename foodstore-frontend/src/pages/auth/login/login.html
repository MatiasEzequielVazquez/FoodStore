<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Login</title>
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <div class="inicio">
        <h1>Food Store</h1>
        <p class="sesion">Iniciar Sesión</p>

        <form id="form">
            <div class="input">
                <div class="input-email">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="tucorreo@ejemplo.com" />
                </div>
                <div class="input-pw">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required placeholder="Mínimo 8 caracteres" />
                </div>
            </div>

            <button class="btn" type="submit">Ingresar</button>
        </form>

        <p id="mensaje" class="mensaje"></p>

        <p class="registro">
            ¿No tenés cuenta? <a href="/src/pages/auth/registro/registro.html">Registrate acá</a>
        </p>
    </div>

    <script type="module" src="./login.ts"></script>
</body>

</html>
