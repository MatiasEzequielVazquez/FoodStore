<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Catálogo</title>
    <link rel="stylesheet" href="../store.css">
</head>
<body>

    <header>
        <h1>Food Store</h1>
        <nav>
            <a href="./home.html">Inicio</a>
            <a href="../../client/orders/orders.html">📦 Mis Pedidos</a>
            <a href="../cart/cart.html" class="carrito-link">
                🛒 Carrito
                <span id="contadorCarrito">0</span>
            </a>
            <button class="btn-cerrar" id="btnCerrarSesion">Cerrar Sesión</button>
        </nav>
    </header>

    <aside>
        <h2>Categorías</h2>
        <ul id="listaCategorias"></ul>
    </aside>

    <main>
        <div class="barra-busqueda">
            <input
                id="inputBusqueda"
                type="text"
                placeholder="Buscar productos..."
            />
            <button id="btnBuscar">Buscar</button>
        </div>

        <h2 id="tituloCatalogo">Productos Destacados</h2>
        <section id="contenedorProductos"></section>
    </main>

    <footer>
        <p>&copy; 2026 Food Store. Todos los derechos reservados.</p>
    </footer>

    <!-- Toast de confirmación -->
    <div id="toast" class="toast"></div>

    <script type="module" src="./home.ts"></script>
</body>
</html>
