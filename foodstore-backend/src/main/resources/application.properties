spring.application.name=foodstore-backend

# H2 Database
#spring.datasource.url=jdbc:h2:mem:foodstore
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=

# H2 Console (para ver las tablas en el browser)
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# JPA / Hibernate
# DEV
#spring.jpa.hibernate.ddl-auto=create-drop
# PROD
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

# Postgres DB
spring.datasource.url=jdbc:postgresql://localhost:5432/foodstore
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=foodstore
spring.datasource.password=foodstore